name: Deploy API to ECS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
      ECS_EXECUTION_ROLE_ARN: ${{ vars.ECS_EXECUTION_ROLE_ARN }}
      ECS_TASK_ROLE_ARN: ${{ vars.ECS_TASK_ROLE_ARN }}
      ECS_SUBNETS: ${{ vars.ECS_SUBNETS }}
      ECS_SECURITY_GROUPS: ${{ vars.ECS_SECURITY_GROUPS }}
      ECS_ASSIGN_PUBLIC_IP: ${{ vars.ECS_ASSIGN_PUBLIC_IP }}
      CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
      APP_CPU: ${{ vars.APP_CPU }}
      APP_MEMORY: ${{ vars.APP_MEMORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required workflow variables
        run: |
          set -euo pipefail
          missing=0
          for key in AWS_REGION ECR_REPOSITORY ECS_CLUSTER ECS_SERVICE ECS_TASK_FAMILY ECS_EXECUTION_ROLE_ARN ECS_SUBNETS ECS_SECURITY_GROUPS CONTAINER_NAME; do
            if [ -z "${!key:-}" ]; then
              echo "Missing repository variable: $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Set required repository variables under Settings > Secrets and variables > Actions > Variables"
            exit 1
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          set -euo pipefail
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY" >/dev/null

      - name: Build and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f src/Easshas.WebApi/Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Ensure CloudWatch log group exists
        run: |
          set -euo pipefail
          aws logs create-log-group --log-group-name "/ecs/$ECS_SERVICE" >/dev/null 2>&1 || true

      - name: Register task definition
        id: taskdef
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
          CONNECTIONSTRINGS_POSTGRES: ${{ secrets.CONNECTIONSTRINGS_POSTGRES }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AWS_REGION_APP: ${{ secrets.AWS_REGION_APP }}
          AWS_ACCESS_KEY_APP: ${{ secrets.AWS_ACCESS_KEY_APP }}
          AWS_SECRET_KEY_APP: ${{ secrets.AWS_SECRET_KEY_APP }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_ADMIN: ${{ secrets.EMAIL_ADMIN }}
        run: |
          set -euo pipefail

          TASK_ROLE_JSON=""
          if [ -n "${ECS_TASK_ROLE_ARN:-}" ]; then
            TASK_ROLE_JSON=",\"taskRoleArn\":\"$ECS_TASK_ROLE_ARN\""
          fi

          APP_CPU_VAL="${APP_CPU:-512}"
          APP_MEMORY_VAL="${APP_MEMORY:-1024}"

          cat > task-definition.json <<EOF
          {
            "family": "$ECS_TASK_FAMILY",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "$APP_CPU_VAL",
            "memory": "$APP_MEMORY_VAL",
            "executionRoleArn": "$ECS_EXECUTION_ROLE_ARN"$TASK_ROLE_JSON,
            "containerDefinitions": [
              {
                "name": "$CONTAINER_NAME",
                "image": "$IMAGE_URI",
                "essential": true,
                "portMappings": [
                  {
                    "containerPort": 8080,
                    "hostPort": 8080,
                    "protocol": "tcp"
                  }
                ],
                "environment": [
                  { "name": "ASPNETCORE_ENVIRONMENT", "value": "Production" },
                  { "name": "ConnectionStrings__Postgres", "value": "$CONNECTIONSTRINGS_POSTGRES" },
                  { "name": "Jwt__Key", "value": "$JWT_KEY" },
                  { "name": "Jwt__Issuer", "value": "$JWT_ISSUER" },
                  { "name": "Jwt__Audience", "value": "$JWT_AUDIENCE" },
                  { "name": "Paystack__SecretKey", "value": "$PAYSTACK_SECRET_KEY" },
                  { "name": "App__AI__ApiKey", "value": "$OPENAI_API_KEY" },
                  { "name": "AWS__Region", "value": "$AWS_REGION_APP" },
                  { "name": "AWS__AccessKey", "value": "$AWS_ACCESS_KEY_APP" },
                  { "name": "AWS__SecretKey", "value": "$AWS_SECRET_KEY_APP" },
                  { "name": "Email__From", "value": "$EMAIL_FROM" },
                  { "name": "Email__Admin", "value": "$EMAIL_ADMIN" }
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/$ECS_SERVICE",
                    "awslogs-region": "$AWS_REGION",
                    "awslogs-stream-prefix": "ecs"
                  }
                }
              }
            ]
          }
          EOF

          TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file://task-definition.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_definition_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Ensure ECS cluster exists
        run: |
          set -euo pipefail
          aws ecs describe-clusters --clusters "$ECS_CLUSTER" --query 'clusters[0].clusterName' --output text >/dev/null 2>&1 || \
          aws ecs create-cluster --cluster-name "$ECS_CLUSTER" >/dev/null

      - name: Create or update ECS service
        env:
          TASK_DEF_ARN: ${{ steps.taskdef.outputs.task_definition_arn }}
        run: |
          set -euo pipefail

          IFS=',' read -ra SUBNET_ARR <<< "$ECS_SUBNETS"
          IFS=',' read -ra SG_ARR <<< "$ECS_SECURITY_GROUPS"

          SUBNETS_JSON=$(printf '"%s",' "${SUBNET_ARR[@]}")
          SUBNETS_JSON="[${SUBNETS_JSON%,}]"

          SGS_JSON=$(printf '"%s",' "${SG_ARR[@]}")
          SGS_JSON="[${SGS_JSON%,}]"

          ASSIGN_PUBLIC_IP_VAL="${ECS_ASSIGN_PUBLIC_IP:-DISABLED}"
          NETWORK_CFG="awsvpcConfiguration={subnets=$SUBNETS_JSON,securityGroups=$SGS_JSON,assignPublicIp=$ASSIGN_PUBLIC_IP_VAL}"

          STATUS=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")

          if [ "$STATUS" = "ACTIVE" ]; then
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "$ECS_SERVICE" \
              --task-definition "$TASK_DEF_ARN" \
              --force-new-deployment >/dev/null
          else
            aws ecs create-service \
              --cluster "$ECS_CLUSTER" \
              --service-name "$ECS_SERVICE" \
              --task-definition "$TASK_DEF_ARN" \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "$NETWORK_CFG" >/dev/null
          fi

      - name: Wait for service stability
        run: |
          set -euo pipefail
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE"
          echo "Deployment complete."
