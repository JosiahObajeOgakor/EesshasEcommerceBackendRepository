name: Deploy API to ECS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
      ECS_EXECUTION_ROLE_ARN: ${{ vars.ECS_EXECUTION_ROLE_ARN }}
      ECS_TASK_ROLE_ARN: ${{ vars.ECS_TASK_ROLE_ARN }}
      ECS_SUBNETS: ${{ vars.ECS_SUBNETS }}
      ECS_SECURITY_GROUPS: ${{ vars.ECS_SECURITY_GROUPS }}
      ECS_ASSIGN_PUBLIC_IP: ${{ vars.ECS_ASSIGN_PUBLIC_IP }}
      CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
      APP_CPU: ${{ vars.APP_CPU }}
      APP_MEMORY: ${{ vars.APP_MEMORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required workflow configuration
        env:
          AWS_ACCESS_KEY_ID_SECRET: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CONNECTIONSTRINGS_POSTGRES_SECRET: ${{ secrets.CONNECTIONSTRINGS_POSTGRES }}
          JWT_KEY_SECRET: ${{ secrets.JWT_KEY }}
          JWT_ISSUER_SECRET: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE_SECRET: ${{ secrets.JWT_AUDIENCE }}
          PAYSTACK_SECRET_KEY_SECRET: ${{ secrets.PAYSTACK_SECRET_KEY }}
          OPENAI_API_KEY_SECRET: ${{ secrets.OPENAI_API_KEY }}
          AWS_REGION_APP_SECRET: ${{ secrets.AWS_REGION_APP }}
          AWS_ACCESS_KEY_APP_SECRET: ${{ secrets.AWS_ACCESS_KEY_APP }}
          AWS_SECRET_KEY_APP_SECRET: ${{ secrets.AWS_SECRET_KEY_APP }}
          EMAIL_FROM_SECRET: ${{ secrets.EMAIL_FROM }}
          EMAIL_ADMIN_SECRET: ${{ secrets.EMAIL_ADMIN }}
        run: |
          set -euo pipefail
          missing=0

          for key in AWS_REGION ECR_REPOSITORY ECS_CLUSTER ECS_SERVICE ECS_TASK_FAMILY ECS_EXECUTION_ROLE_ARN ECS_SUBNETS ECS_SECURITY_GROUPS CONTAINER_NAME; do
            if [ -z "${!key:-}" ]; then
              echo "Missing repository variable: $key"
              missing=1
            fi
          done

          for key in CONNECTIONSTRINGS_POSTGRES_SECRET JWT_KEY_SECRET JWT_ISSUER_SECRET JWT_AUDIENCE_SECRET PAYSTACK_SECRET_KEY_SECRET OPENAI_API_KEY_SECRET AWS_REGION_APP_SECRET AWS_ACCESS_KEY_APP_SECRET AWS_SECRET_KEY_APP_SECRET EMAIL_FROM_SECRET EMAIL_ADMIN_SECRET; do
            if [ -z "${!key:-}" ]; then
              echo "Missing repository secret: ${key%_SECRET}"
              missing=1
            fi
          done

          if [ -z "${AWS_ROLE_TO_ASSUME:-}" ]; then
            for key in AWS_ACCESS_KEY_ID_SECRET AWS_SECRET_ACCESS_KEY_SECRET; do
              if [ -z "${!key:-}" ]; then
                echo "Missing repository secret: ${key%_SECRET}"
                missing=1
              fi
            done
          fi

          if [ "$missing" -eq 1 ]; then
            echo "Set required repository variables and secrets under Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Configure AWS credentials with OIDC
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-easshas-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials with access keys
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          set -euo pipefail
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY" >/dev/null

      - name: Build and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f src/Easshas.WebApi/Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Ensure CloudWatch log group exists
        run: |
          set -euo pipefail
          aws logs create-log-group --log-group-name "/ecs/$ECS_SERVICE" >/dev/null 2>&1 || true

      - name: Register task definition
        id: taskdef
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
          CONNECTIONSTRINGS_POSTGRES: ${{ secrets.CONNECTIONSTRINGS_POSTGRES }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AWS_REGION_APP: ${{ secrets.AWS_REGION_APP }}
          AWS_ACCESS_KEY_APP: ${{ secrets.AWS_ACCESS_KEY_APP }}
          AWS_SECRET_KEY_APP: ${{ secrets.AWS_SECRET_KEY_APP }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_ADMIN: ${{ secrets.EMAIL_ADMIN }}
        run: |
          set -euo pipefail
          python - << 'PY'
          import json
          import os

          family = os.environ["ECS_TASK_FAMILY"]
          cpu = os.environ.get("APP_CPU") or "512"
          memory = os.environ.get("APP_MEMORY") or "1024"
          execution_role = os.environ["ECS_EXECUTION_ROLE_ARN"]
          task_role = os.environ.get("ECS_TASK_ROLE_ARN") or ""
          container_name = os.environ["CONTAINER_NAME"]
          image = os.environ["IMAGE_URI"]
          ecs_service = os.environ["ECS_SERVICE"]
          aws_region = os.environ["AWS_REGION"]

          env_vars = [
            {"name": "ASPNETCORE_ENVIRONMENT", "value": "Production"},
            {"name": "ConnectionStrings__Postgres", "value": os.environ["CONNECTIONSTRINGS_POSTGRES"]},
            {"name": "Jwt__Key", "value": os.environ["JWT_KEY"]},
            {"name": "Jwt__Issuer", "value": os.environ["JWT_ISSUER"]},
            {"name": "Jwt__Audience", "value": os.environ["JWT_AUDIENCE"]},
            {"name": "Paystack__SecretKey", "value": os.environ["PAYSTACK_SECRET_KEY"]},
            {"name": "App__AI__ApiKey", "value": os.environ["OPENAI_API_KEY"]},
            {"name": "AWS__Region", "value": os.environ["AWS_REGION_APP"]},
            {"name": "AWS__AccessKey", "value": os.environ["AWS_ACCESS_KEY_APP"]},
            {"name": "AWS__SecretKey", "value": os.environ["AWS_SECRET_KEY_APP"]},
            {"name": "Email__From", "value": os.environ["EMAIL_FROM"]},
            {"name": "Email__Admin", "value": os.environ["EMAIL_ADMIN"]},
          ]

          task_def = {
            "family": family,
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": str(cpu),
            "memory": str(memory),
            "executionRoleArn": execution_role,
            "containerDefinitions": [
              {
                "name": container_name,
                "image": image,
                "essential": True,
                "portMappings": [
                  {
                    "containerPort": 8080,
                    "hostPort": 8080,
                    "protocol": "tcp",
                  }
                ],
                "environment": env_vars,
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": f"/ecs/{ecs_service}",
                    "awslogs-region": aws_region,
                    "awslogs-stream-prefix": "ecs",
                  },
                },
              }
            ],
          }

          if task_role:
            task_def["taskRoleArn"] = task_role

          with open("task-definition.json", "w", encoding="utf-8") as f:
            json.dump(task_def, f)
          PY

          TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file://task-definition.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_definition_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Ensure ECS cluster exists
        run: |
          set -euo pipefail
          aws ecs describe-clusters --clusters "$ECS_CLUSTER" --query 'clusters[0].clusterName' --output text >/dev/null 2>&1 || \
          aws ecs create-cluster --cluster-name "$ECS_CLUSTER" >/dev/null

      - name: Create or update ECS service
        env:
          TASK_DEF_ARN: ${{ steps.taskdef.outputs.task_definition_arn }}
        run: |
          set -euo pipefail

          IFS=',' read -ra SUBNET_ARR <<< "$ECS_SUBNETS"
          IFS=',' read -ra SG_ARR <<< "$ECS_SECURITY_GROUPS"

          SUBNETS_JSON=$(printf '"%s",' "${SUBNET_ARR[@]}")
          SUBNETS_JSON="[${SUBNETS_JSON%,}]"

          SGS_JSON=$(printf '"%s",' "${SG_ARR[@]}")
          SGS_JSON="[${SGS_JSON%,}]"

          ASSIGN_PUBLIC_IP_VAL="${ECS_ASSIGN_PUBLIC_IP:-DISABLED}"
          NETWORK_CFG="awsvpcConfiguration={subnets=$SUBNETS_JSON,securityGroups=$SGS_JSON,assignPublicIp=$ASSIGN_PUBLIC_IP_VAL}"

          STATUS=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")

          if [ "$STATUS" = "ACTIVE" ]; then
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "$ECS_SERVICE" \
              --task-definition "$TASK_DEF_ARN" \
              --force-new-deployment >/dev/null
          else
            aws ecs create-service \
              --cluster "$ECS_CLUSTER" \
              --service-name "$ECS_SERVICE" \
              --task-definition "$TASK_DEF_ARN" \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "$NETWORK_CFG" >/dev/null
          fi

      - name: Wait for service stability
        run: |
          set -euo pipefail
          if aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE"; then
            echo "Deployment complete."
            exit 0
          fi

          echo "Service failed to become stable. Dumping ECS diagnostics..."
          aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE"
          echo "Recent ECS service events:"
          aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" --query 'services[0].events[0:10].[createdAt,message]' --output table

          for STATUS in STOPPED PENDING RUNNING; do
            TASK_ARNS=$(aws ecs list-tasks --cluster "$ECS_CLUSTER" --service-name "$ECS_SERVICE" --desired-status "$STATUS" --query 'taskArns' --output text)
            if [ -n "$TASK_ARNS" ] && [ "$TASK_ARNS" != "None" ]; then
              echo "Task details for status: $STATUS"
              aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks $TASK_ARNS
            fi
          done

          exit 1
