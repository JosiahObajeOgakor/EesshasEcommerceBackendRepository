# Nginx reverse-proxy configuration for the Easshas API
# Place this file at /etc/nginx/sites-available/easshas
# then: sudo ln -s /etc/nginx/sites-available/easshas /etc/nginx/sites-enabled/
# and:  sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   - Certbot installed and a certificate obtained:
#       sudo certbot --nginx -d api.eeshasgloss.com
#   - The ASP.NET Core app is running on 127.0.0.1:5000 (see easshas-api.service)

server {
    listen 80;
    server_name api.eeshasgloss.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.eeshasgloss.com;

    # --- TLS certificates (managed by Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/api.eeshasgloss.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.eeshasgloss.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

    # --- Proxy settings ---
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # Required for SignalR WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # Increase timeouts for long-running operations (file uploads, SignalR)
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        send_timeout          120s;

        # Body size limit matches Kestrel's 10 MB cap
        client_max_body_size 10m;
    }
}
