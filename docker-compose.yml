version: '3.9'
services:
  db:
    image: postgres:16-alpine
    container_name: easshas_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    build:
      # Build context is the repository root so the Dockerfile can access
      # EasshasBackend.sln and all src/* projects.
      context: .
      dockerfile: src/Easshas.WebApi/Dockerfile
    container_name: easshas_api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__Postgres: ${CONNECTIONSTRINGS_POSTGRES}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Paystack__SecretKey: ${PAYSTACK_SECRET_KEY}
      AWS__Region: ${AWS_REGION}
      AWS__AccessKey: ${AWS_ACCESS_KEY_ID}
      AWS__SecretKey: ${AWS_SECRET_ACCESS_KEY}
      App__AI__ApiKey: ${OPENAI_API_KEY}
      Email__From: ${EMAIL_FROM}
      Email__Admin: ${EMAIL_ADMIN}
      Email__Smtp__Host: ${EMAIL_SMTP_HOST}
      Email__Smtp__Port: ${EMAIL_SMTP_PORT:-465}
      Email__Smtp__Username: ${EMAIL_SMTP_USERNAME}
      Email__Smtp__Password: ${EMAIL_SMTP_PASSWORD}
      Email__Smtp__UseStartTls: ${EMAIL_SMTP_USE_STARTTLS:-true}
      Contacts__Auth__Username: ${CONTACTS_AUTH_USERNAME}
      Contacts__Auth__Password: ${CONTACTS_AUTH_PASSWORD}
      Cors__Origins__0: ${CORS_ORIGIN_0}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: on-failure
volumes:
  pgdata: {}
