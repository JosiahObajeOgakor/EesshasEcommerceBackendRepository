version: '3.9'
services:
  db:
    image: postgres:16-alpine
    container_name: easshas_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    build:
      # Build context is the repository root so the multi-stage Dockerfile can
      # access the full solution (EasshasBackend.sln + all src/ projects).
      context: .
      dockerfile: src/Easshas.WebApi/Dockerfile
    container_name: easshas_api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: ${ConnectionStrings__Postgres}
      Jwt__Key: ${Jwt__Key}
      Jwt__Issuer: ${Jwt__Issuer}
      Jwt__Audience: ${Jwt__Audience}
      Paystack__SecretKey: ${Paystack__SecretKey}
      AWS__Region: ${AWS__Region}
      AWS__AccessKey: ${AWS__AccessKey}
      AWS__SecretKey: ${AWS__SecretKey}
      App__AI__ApiKey: ${App__AI__ApiKey}
      Email__From: ${Email__From}
      Email__Admin: ${Email__Admin}
      Email__Smtp__Password: ${Email__Smtp__Password}
    depends_on:
      - db
    ports:
      - "8080:8080"
    restart: on-failure
volumes:
  pgdata: {}
